name: Publish (Native AOT)

# Builds the self-contained, Native AOT, unpackaged app for x64 and ARM64 on a
# clean windows-latest runner (which ships the "Desktop development with C++"
# workload + ARM64 build tools that Native AOT's native linker requires). This is
# the end-to-end gate for the AOT configuration in SimpliPDF.csproj.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  aot:
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      PROJECT: SimpliPDF/SimpliPDF.csproj
      TFM: net10.0-windows10.0.26100.0

    strategy:
      # Keep x64 green even if the ARM64 toolchain has a hiccup, and vice versa.
      fail-fast: false
      matrix:
        platform: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }} -p:Platform=${{ matrix.platform }}

      - name: Publish self-contained (Native AOT)
        shell: pwsh
        run: |
          dotnet publish ${{ env.PROJECT }} `
            -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:PublishProfile=win-${{ matrix.platform }}

      - name: Verify the output is really Native AOT
        shell: pwsh
        run: |
          $pub = "SimpliPDF/bin/Release/$env:TFM/win-${{ matrix.platform }}/publish"
          $exe = Get-Item "$pub/SimpliPDF.exe" -ErrorAction Stop
          $sizeMb = [math]::Round($exe.Length / 1MB, 2)
          Write-Host "SimpliPDF.exe = $sizeMb MB"
          # A JIT self-contained fallback ships the runtime (coreclr.dll) next to a
          # tiny ~0.3 MB apphost; a Native AOT build has neither.
          if (Test-Path "$pub/coreclr.dll") {
            throw "coreclr.dll present -> JIT runtime, NOT Native AOT."
          }
          if ($sizeMb -lt 5) {
            throw "SimpliPDF.exe is only $sizeMb MB -> looks like a JIT apphost, not a Native AOT binary."
          }
          Write-Host "Verified: Native AOT output."

      # Guard the exact regression that once shipped a published app which crashed before its
      # window appeared: the app's merged resources.pri (which indexes the compiled XBF XAML)
      # was missing, so every ms-appx XAML component failed to load with a XamlParseException.
      # It is generated by the MSIX tooling targets (EnableMsixTooling) and named after the
      # project; the Microsoft.*.pri files are framework resources and are NOT a substitute.
      - name: Verify app resources are packaged (resources.pri)
        shell: pwsh
        run: |
          $pub = "SimpliPDF/bin/Release/$env:TFM/win-${{ matrix.platform }}/publish"
          $pri = Get-Item "$pub/SimpliPDF.pri" -ErrorAction SilentlyContinue
          if (-not $pri) {
            throw "SimpliPDF.pri is missing from the publish output -> app XAML would fail to load at runtime (XamlParseException). Is <EnableMsixTooling>true</EnableMsixTooling> set?"
          }
          Write-Host "Verified: SimpliPDF.pri present ($([math]::Round($pri.Length / 1KB)) KB)."

      # The window/taskbar icon (AppWindow.SetIcon reads Assets\AppIcon.ico by absolute path) and
      # the title bar icon (ms-appx:///Assets/AppIcon.png, which resolves the Assets\AppIcon.scale-*.png
      # candidates) both load their files from disk at runtime. `dotnet build` lays the Assets folder
      # out automatically, but `dotnet publish` only does so because the AppIcon assets carry
      # CopyToOutputDirectory in SimpliPDF.csproj -- without it the published/MSI app shipped with no
      # Assets folder and fell back to the default icon. Guard that exact regression.
      - name: Verify app icon assets are deployed
        shell: pwsh
        run: |
          $pub = "SimpliPDF/bin/Release/$env:TFM/win-${{ matrix.platform }}/publish"
          $needed = @(
            'Assets/AppIcon.ico',
            'Assets/AppIcon.scale-100.png',
            'Assets/AppIcon.scale-200.png'
          )
          foreach ($rel in $needed) {
            if (-not (Test-Path "$pub/$rel")) {
              throw "$rel is missing from the publish output -> the window/taskbar/title bar icon would fall back to the default. Ensure the AppIcon assets have CopyToOutputDirectory set in SimpliPDF.csproj."
            }
          }
          Write-Host "Verified: AppIcon assets present in publish output."

      # Actually RUN a Native AOT binary and exercise the COM paths that silently broke before
      # (Win32 file dialogs + WIA scanner). Publishing alone never caught the failure because the
      # app was never launched. The x64 runner can execute the x64 native harness; the arm64 leg is
      # skipped because a native arm64 binary can't run on the x64 runner. build.ps1 -ComSmokeTest
      # detects the host arch (x64 here), AOT-publishes tools/ComSmokeTest, runs it, and exits
      # non-zero on any ComWrappers/marshalling failure.
      - name: Run COM smoke test (Native AOT)
        if: matrix.platform == 'x64'
        shell: pwsh
        run: .\build.ps1 -ComSmokeTest -Configuration Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpliPDF-${{ matrix.platform }}
          path: SimpliPDF/bin/Release/${{ env.TFM }}/win-${{ matrix.platform }}/publish/
